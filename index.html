<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ระบบเช็คชื่อนักเรียน — ม.5/3</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1c1917" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="เช็คชื่อ" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" type="image/png" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#1c1917"/>
  <text x="100" y="125" font-family="system-ui, sans-serif" font-size="100" font-weight="600" fill="#fafaf9" text-anchor="middle">ช</text>
</svg>
</template>
<div id="root"></div>

<!-- ===== LIFF Config ===== -->
<!-- หลังจากสร้าง LIFF App ใน LINE Developers แล้ว ให้เอา LIFF ID มาวางที่นี่ -->
<!-- LIFF ID หน้าตาประมาณนี้: 2001234567-AbCdEfGh -->
<script>
  window.LIFF_ID = ""; // ⬅ ใส่ LIFF ID ของคุณตรงนี้ (เว้นว่างไว้ถ้ายังไม่มี — แอปก็ยังใช้ได้ปกติ)
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script type="text/babel" src="bundle.jsx"></script>
<script>
  // Init LIFF (ถ้ามี LIFF_ID)
  if (window.LIFF_ID && window.liff) {
    liff.init({ liffId: window.LIFF_ID })
      .then(() => {
        console.log('LIFF ready', { inClient: liff.isInClient() });
        window.LIFF_READY = true;
      })
      .catch((err) => console.warn('LIFF init failed:', err));
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
